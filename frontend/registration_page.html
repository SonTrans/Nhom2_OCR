</div>

<p class="font-body-sm text-body-sm text-on-primary-container opacity-90">Upload any invoice and watch our neural engine extract line items with 99.9% precision.</p>

<!-- Background Decorative Elements -->
<div class="absolute bottom-0 right-0 w-64 h-64 bg-primary-container rounded-full blur-[100px] opacity-30 -mb-20 -mr-20"></div>

<!-- Header -->
<header class="text-center md:text-left">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-outline">Join InvoScanner to simplify your workflow</p>
</header>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1" for="name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline/50 transition-all focus:border-primary input-focus-ring" id="name" placeholder="John Doe" type="text">
</div>
</div>
<!-- Email Address -->

<!-- Password -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline/50 transition-all focus:border-primary input-focus-ring" id="password" oninput="updateStrength(this.value)" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>

<div class="h-full w-0 transition-all duration-500 rounded-full" id="strength-bar"></div>
</div>
<span class="text-[10px] font-label-sm uppercase tracking-wider text-outline" id="strength-text">Password Strength</span>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1" for="confirm-password">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock_reset</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline/50 transition-all focus:border-primary input-focus-ring" id="confirm-password" placeholder="••••••••" type="password">
</div>
</div>
<!-- Terms Checkbox -->

<button class="w-full py-4 bg-primary text-on-primary font-label-md text-label-md rounded-xl shadow-lg shadow-primary/20 hover:bg-primary-container hover:shadow-xl transition-all active:scale-[0.98]" type="submit">
                        Create Account
                    </button>

</p>
</footer>

<!-- Micro-interaction Script -->
<script>
        function updateStrength(val) {
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');

            if (val.length === 0) {
                bar.style.width = '0%';
                text.innerText = 'Password Strength';
                text.className = 'text-[10px] font-label-sm uppercase tracking-wider text-outline';
            } else if (val.length < 6) {
                bar.style.width = '33%';
                bar.className = 'h-full bg-error transition-all duration-500 rounded-full';
                text.innerText = 'Weak';
                text.className = 'text-[10px] font-label-sm uppercase tracking-wider text-error';
            } else if (val.length < 10) {
                bar.style.width = '66%';
                bar.className = 'h-full bg-secondary-container transition-all duration-500 rounded-full';
                text.innerText = 'Medium';
                text.className = 'text-[10px] font-label-sm uppercase tracking-wider text-secondary';
            } else {
                bar.style.width = '100%';
                bar.className = 'h-full bg-primary-container transition-all duration-500 rounded-full';
                text.innerText = 'Strong';
                text.className = 'text-[10px] font-label-sm uppercase tracking-wider text-primary';
            }
        }
    </script>
